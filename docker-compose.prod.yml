services:
  backend:
    image: ghcr.io/vedavyas-karumanchi/taskflow-backend:latest
    environment:
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
             "fetch('http://localhost:5000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    image: ghcr.io/vedavyas-karumanchi/taskflow-frontend:latest
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy