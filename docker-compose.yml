services:
  backend:
    build: ./backend
    environment:
      - PORT=5000
    # no "ports:" — the backend is only reachable inside the compose
    # network, via nginx. Nothing on the host can hit it directly.
    healthcheck:
      test: ["CMD", "node", "-e",
             "fetch('http://localhost:5000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"        # host 3000 → container 80 (nginx)
    depends_on:
      backend:
        condition: service_healthy