server {
  listen 80;

  # Job 1: serve the React static files.
  # try_files makes client-side routing work: unknown paths fall back
  # to index.html so React Router (if you add it later) can handle them.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Job 2: reverse-proxy API calls to the backend container.
  # "backend" is a DNS name that Docker Compose provides (service name).
  location /api/ {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}