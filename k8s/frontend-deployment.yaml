apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: taskflow
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/vedavyas-karumanchi/taskflow-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80       # nginx serves on 80 inside the container
          resources:
            requests: { cpu: 50m, memory: 64Mi }    # static file serving is cheap
            limits:   { cpu: 200m, memory: 128Mi }
          readinessProbe:
            httpGet: { path: /, port: 80 }          # "can you serve index.html?"
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10